name: cards-pages-manual
on:
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: 'pages-manual'
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 scripts/site_smoke.py --site-dir pages
      - run: python3 scripts/site_manifest.py pages --out out/pages_manifest.json
      - run: diff -u docs/manifest.expected.json out/pages_manifest.json
      - uses: actions/upload-pages-artifact@v3
        with:
          path: pages
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
