name: render-test
on:
  workflow_dispatch:
  push:
  pull_request:
jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 scripts/site_smoke.py --site-dir pages
      - run: python3 scripts/site_manifest.py pages --out out/pages_manifest.json
      - run: diff -u docs/manifest.expected.json out/pages_manifest.json
      - name: Archive tracked Pages snapshot
        run: tar -czf pages.tgz -C pages .
      - uses: actions/upload-artifact@v4
        with:
          name: pages-snapshot
          path: pages.tgz
